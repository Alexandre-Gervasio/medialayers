<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; media-src 'self' blob: mediastream:; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>MediaLayers — Controle Grid</title>
  <link rel="stylesheet" href="style-v2.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════ -->
  <!--  HEADER                                 -->
  <!-- ═══════════════════════════════════════ -->
  <header>
    <div class="header-left">
      <span class="logo">🎬 MediaLayers</span>
      <span class="version">v2.0 - GRID</span>
    </div>
    <div class="header-controls">
      <!-- Y (LINHAS - Vertical) -->
      <div class="grid-control-group">
        <label>Y (Linhas):</label>
        <button class="btn btn-sm" id="btn-remove-row" title="Remover linha">−</button>
        <input type="number" id="grid-rows" value="4" min="1" max="12" placeholder="Y">
        <button class="btn btn-sm" id="btn-add-row" title="Adicionar linha">+</button>
      </div>

      <!-- X (COLUNAS - Horizontal) -->
      <div class="grid-control-group">
        <label>X (Colunas):</label>
        <button class="btn btn-sm" id="btn-remove-col" title="Remover coluna">−</button>
        <input type="number" id="grid-cols" value="6" min="1" max="12" placeholder="X">
        <button class="btn btn-sm" id="btn-add-col" title="Adicionar coluna">+</button>
      </div>

      <!-- Layout Presets (FASE 3) -->
      <div class="layout-presets">
        <label>📐 Layout:</label>
        <select id="layout-preset">
          <option value="default">Padrão (3-painéis)</option>
          <option value="fullscreen-grid">Grid em Tela Cheia</option>
          <option value="fullscreen-props">Propriedades em Tela Cheia</option>
          <option value="output-focus">Foco em Saída</option>
        </select>
        <button class="btn btn-sm" id="btn-save-layout" title="Salvar layout">💾</button>
        <button class="btn btn-sm" id="btn-reset-layout" title="Resetar layout">↻</button>
      </div>

      <button class="btn btn-secondary" id="btn-reset-grid">Resetar</button>
      <button class="btn btn-danger" id="btn-clear-all">Limpar Tudo</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════ -->
  <!--  WORKSPACE: 3 PAINÉIS                  -->
  <!-- ═══════════════════════════════════════ -->
  <div class="workspace">

    <!-- ┌─ PAINEL ESQUERDO: Editor de Célula ─┐ -->
    <aside class="panel panel-left">
      <div class="panel-header">
        <h2>📍 Célula Selecionada</h2>
      </div>

      <div class="cell-info">
        <div class="info-display">
          <span id="cell-coords">Nenhuma célula selecionada</span>
        </div>
      </div>

      <!-- Layers da célula -->
      <div class="panel-header" style="margin-top: 10px;">
        <h3>Camadas</h3>
        <button class="btn btn-sm" id="btn-add-layer" title="Adicionar camada">➕</button>
      </div>

      <div id="layers-panel" class="layers-panel">
        <!-- Layers renderizadas aqui -->
      </div>

      <!-- Toolbar de mídia -->
      <div class="media-toolbar">
        <button class="btn btn-sm" id="btn-add-video" title="Vídeo">🎥</button>
        <button class="btn btn-sm" id="btn-add-image" title="Imagem">🖼</button>
        <button class="btn btn-sm" id="btn-add-audio" title="Áudio">🔊</button>
        <button class="btn btn-sm" id="btn-add-text" title="Texto">📝</button>
        <button class="btn btn-sm" id="btn-add-camera" title="Câmera">📷</button>
      </div>
    </aside>

    <!-- ┌─ PAINEL CENTRAL: GRID + PREVIEW ─┐ -->
    <main class="panel panel-center">
      <!-- TAB 1: Grid de Shots -->
      <div class="tabs-header">
        <button class="tab-btn active" data-tab="grid-view">📊 Grid</button>
        <button class="tab-btn" data-tab="preview-view">👁 Preview</button>
        <button class="tab-btn" data-tab="output-view">📡 Saída</button>
        <button class="tab-btn" data-tab="switcher-view">🎛 Mesa de Corte</button>
      </div>

      <!-- Grid de Células (com scroll obrigatório) -->
      <div id="grid-view" class="tab-content active">
        <div id="clips-grid" class="clips-grid">
          <!-- Células renderizadas aqui -->
        </div>
      </div>

      <!-- Preview da célula ativa (em tempo real) -->
      <div id="preview-view" class="tab-content">
        <div class="preview-container">
          <canvas id="preview-canvas" width="1280" height="720"></canvas>
          <div class="preview-controls">
            <button class="btn btn-sm" id="btn-play-preview">▶ Play</button>
            <button class="btn btn-sm" id="btn-stop-preview">⏹ Stop</button>
          </div>
        </div>
      </div>

      <!-- Preview + Program Monitors (Fase 2) -->
      <div id="output-view" class="tab-content">
        <div class="output-monitors-container">
          <div class="monitor-section">
            <div class="monitor-label">👁 PREVIEW (Preparando)</div>
            <canvas id="monitor-preview" class="monitor-canvas" width="960" height="540"></canvas>
            <div class="monitor-info" id="monitor-preview-info">Nenhuma célula selecionada</div>
          </div>

          <div class="transition-controls-section">
            <label>⏱ Transição:</label>
            <select id="transition-type">
              <option value="cut">Cut (instantâneo)</option>
              <option value="fade">Fade (500ms)</option>
              <option value="dissolve">Dissolve (1000ms)</option>
            </select>
            <button class="btn btn-go-live" id="btn-go-live">→ ON AIR</button>
          </div>

          <div class="monitor-section">
            <div class="monitor-label live">📺 PROGRAM (Público)</div>
            <canvas id="monitor-program" class="monitor-canvas" width="960" height="540"></canvas>
            <div class="monitor-info" id="monitor-program-info">🔴 Nada ao ar</div>
          </div>
        </div>
      </div>

      <!-- Mesa de Corte / Switcher (Fase 5) -->
      <div id="switcher-view" class="tab-content">
        <div class="switcher-container">
          <div class="switcher-header">
            <h3>🎛 Mesa de Corte - Entradas Rápidas</h3>
            <div class="switcher-controls">
              <button class="btn btn-sm" id="btn-add-input" title="Adicionar entrada">➕ Entrada</button>
              <button class="btn btn-sm" id="btn-refresh-inputs" title="Atualizar entradas">🔄</button>
            </div>
          </div>

          <div id="inputs-grid" class="inputs-grid">
            <!-- Entradas renderizadas aqui -->
          </div>

          <div class="switcher-footer">
            <div class="transition-section">
              <label>Transição:</label>
              <select id="switcher-transition-type">
                <option value="cut">Cut</option>
                <option value="fade">Fade</option>
                <option value="wipe">Wipe</option>
              </select>
              <input type="number" id="transition-duration" value="500" min="100" max="5000" step="100" placeholder="ms">
            </div>
            <button class="btn btn-primary" id="btn-take">TAKE</button>
          </div>
        </div>
      </div>
    </main>

    <!-- ┌─ PAINEL DIREITO: Propriedades ─┐ -->
    <aside class="panel panel-right">
      <div class="panel-header">
        <h2>⚙️ Propriedades</h2>
      </div>

      <div id="properties-panel" class="properties-panel">
        <!-- Props da layer selecionada renderizadas aqui -->
      </div>
    </aside>

  </div>

  <!-- Inputs de arquivo (ocultos) -->
  <input type="file" id="file-video" accept="video/*" style="display:none">
  <input type="file" id="file-image" accept="image/*" style="display:none">
  <input type="file" id="file-audio" accept="audio/*" style="display:none">

  <!-- Scripts -->
  <script src="dockable-layout.js"></script>
  <script src="app-grid-v2.js"></script>
  <script src="ndi-controller.js"></script>
  <script src="../stream/stream-controller.js"></script>
  <script src="../extensions/letras/letras-extension.js"></script>
  <script src="../extensions/biblia/biblia-extension.js"></script>
</body>
</html>
