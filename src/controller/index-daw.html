<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; media-src 'self' blob: mediastream:; script-src 'self' 'unsafe-inline' https://cdn.socket.io https://code.jquery.com https://cdn.jsdelivr.net http://localhost:3900; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob:; connect-src 'self' ws://localhost:3001 ws://localhost:3900 http://localhost:3900 https://cdn.socket.io https://cdn.jsdelivr.net"
  >
  <title>MediaLayers - DAW Interface</title>
  <link rel="stylesheet" href="style-v2.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-base.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-dark-theme.css" />
  <style>
    :root {
      --bg: #0f1420;
      --bg-2: #111827;
      --surface: #182233;
      --surface-2: #1f2d45;
      --line: #2f425f;
      --text: #e7eef9;
      --muted: #9fb3cc;
      --accent: #1fb6ff;
      --ok: #31a24c;
      --warn: #b77719;
      --danger: #983535;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 0%, #172238 0%, var(--bg) 45%, #0b111b 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    #golden-layout-toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      z-index: 1000;
      background: rgba(10, 16, 27, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(6px);
      overflow-x: auto;
      white-space: nowrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      flex-shrink: 0;
    }

    .brand-group {
      padding-right: 10px;
      margin-right: 4px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: linear-gradient(135deg, #27b4ff 0%, #0f6ad9 100%);
      font-size: 12px;
      font-weight: 800;
      color: #f8fbff;
      box-shadow: 0 10px 30px rgba(31, 182, 255, 0.22);
    }

    .brand-title {
      display: block;
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .brand-subtitle {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    #golden-layout-container {
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 0;
      overflow: hidden;
    }

    .lm_header { background: var(--surface) !important; border-bottom: 1px solid var(--line) !important; }
    .lm_tab { background: #111a29 !important; color: var(--muted) !important; border-right: 1px solid var(--line) !important; }
    .lm_tab.lm_active { background: var(--surface-2) !important; color: var(--text) !important; }
    .lm_content { background: var(--bg-2) !important; }

    .panel-content {
      height: 100%;
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }

    .toolbar-btn {
      border: 1px solid var(--line);
      background: #20334e;
      color: var(--text);
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s ease;
    }

    .toolbar-btn:hover { background: #2a4567; }
    .toolbar-btn.success { background: #1d4f2a; border-color: #2c7540; }
    .toolbar-btn.warning { background: #604112; border-color: #88612a; }
    .toolbar-btn.danger { background: #612a2a; border-color: #854040; }

    .toolbar-btn[disabled], .btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .toolbar-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      min-width: 180px;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(15, 22, 35, 0.98);
      box-shadow: 0 18px 40px rgba(0,0,0,0.32);
      backdrop-filter: blur(14px);
      z-index: 1010;
    }

    .toolbar-menu.is-open { display: flex; }

    .toolbar-menu-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
    }

    .toolbar-menu-item:hover {
      background: #1f2d45;
      border-color: var(--line);
    }

    .layer-label { color: var(--muted); font-size: 12px; margin-left: 12px; }

    .app-toast-host {
      position: fixed;
      top: 72px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      z-index: 2000;
    }

    .app-toast {
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(13, 19, 30, 0.94);
      color: var(--text);
      font-size: 12px;
      box-shadow: 0 18px 30px rgba(0,0,0,0.24);
    }

    .app-toast.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .layer-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .layer-item {
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #141f31;
      cursor: pointer;
    }

    .layer-item.selected { border-color: var(--accent); background: #13324c; }

    .layer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .layer-actions { display: flex; gap: 6px; }

    .btn {
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 4px 8px;
      background: #1f304a;
      color: var(--text);
      cursor: pointer;
      font-size: 11px;
    }

    .btn:hover { background: #2a4568; }
    .btn.small { padding: 3px 6px; }

    .switcher-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      min-height: 280px;
      height: 100%;
    }

    .monitor {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(10, 17, 27, 0.95) 0%, rgba(7, 12, 20, 0.95) 100%);
      display: flex;
      flex-direction: column;
      min-height: 240px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 18px 36px rgba(0,0,0,0.18);
    }

    .monitor-head {
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      padding: 6px 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .monitor canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      flex: 1;
      background-image: radial-gradient(circle at center, rgba(31, 182, 255, 0.06), transparent 60%);
    }

    .switcher-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .timeline-grid,
    .clip-editor {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141f31;
      min-height: 90px;
      padding: 10px;
      overflow: auto;
    }

    .timeline-grid {
      display: grid;
      grid-template-columns: repeat(16, minmax(50px, 1fr));
      gap: 6px;
    }

    .cell {
      height: 32px;
      border-radius: 4px;
      border: 1px solid #304663;
      background: #1d2e45;
    }

    .timeline-panel,
    .clip-launcher-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .timeline-summary-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .timeline-columns-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
      gap: 10px;
    }

    .column-trigger-btn {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #162437 0%, #111b2a 100%);
      color: var(--text);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      cursor: pointer;
    }

    .column-trigger-btn span {
      color: var(--muted);
      font-size: 11px;
    }

    .column-trigger-btn.is-selected {
      border-color: #5ea8ff;
      box-shadow: inset 0 0 0 1px rgba(94, 168, 255, 0.22);
    }

    .column-trigger-btn.is-live {
      border-color: #31a24c;
      background: linear-gradient(180deg, #153423 0%, #101f17 100%);
    }

    .clip-launcher-shell {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .clip-launcher-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .clip-launcher-head span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .clip-grid-head,
    .clip-layer-row {
      display: grid;
      grid-template-columns: 120px repeat(8, minmax(0, 1fr));
      gap: 8px;
    }

    .clip-grid-corner,
    .clip-column-head,
    .clip-layer-label,
    .clip-slot {
      border: 1px solid var(--line);
      border-radius: 10px;
      min-height: 72px;
    }

    .clip-grid-corner,
    .clip-column-head {
      min-height: 52px;
      display: grid;
      place-items: center;
      background: #111a29;
      color: var(--muted);
      font-size: 12px;
    }

    .clip-column-head {
      cursor: pointer;
    }

    .clip-column-head.is-selected {
      color: var(--text);
      border-color: #5ea8ff;
    }

    .clip-column-head.is-live {
      color: #d9ffe2;
      border-color: #31a24c;
      background: #14301d;
    }

    .clip-grid-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .clip-layer-label {
      background: #101925;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .clip-layer-label.is-selected {
      color: var(--text);
      border-color: var(--accent);
      background: #15314a;
    }

    .clip-slot {
      background: linear-gradient(180deg, #152236 0%, #101a29 100%);
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      min-height: 104px;
    }

    .clip-slot strong {
      font-size: 12px;
      line-height: 1.4;
    }

    .clip-slot span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .clip-slot.is-selected {
      border-color: #5ea8ff;
      box-shadow: inset 0 0 0 1px rgba(94, 168, 255, 0.22);
    }

    .clip-slot.is-live {
      border-color: rgba(49, 162, 76, 0.75);
    }

    .clip-slot-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .drop-zone {
      border: 1px dashed #3d5a7d;
      border-radius: 8px;
      padding: 10px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(31, 182, 255, 0.08);
      color: var(--text);
    }

    .properties-panel label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; }
    .property-inline-value { color: var(--accent); margin-left: 6px; font-weight: 600; }
    .properties-panel input,
    .properties-panel select,
    .properties-panel textarea {
      width: 100%;
      background: #111a29;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .diagnostic-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 10px;
    }

    .diagnostic-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .diagnostic-item {
      border: 1px solid var(--line);
      border-left-width: 4px;
      border-radius: 8px;
      padding: 10px;
      background: #101a28;
    }

    .diagnostic-error { border-left-color: #d85f5f; }
    .diagnostic-fatal { border-left-color: #ff3b3b; }

    .diagnostic-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 6px;
    }

    .diagnostic-message {
      color: var(--text);
      font-size: 12px;
      line-height: 1.45;
    }

    .empty-state.compact {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .modal-shell {
      position: fixed;
      inset: 0;
      z-index: 4000;
      display: grid;
      place-items: center;
      background: rgba(3, 8, 14, 0.82);
      backdrop-filter: blur(10px);
    }

    .modal-shell-top {
      align-items: start;
      padding-top: 76px;
    }

    .modal-card {
      width: min(980px, calc(100vw - 32px));
      max-height: calc(100vh - 92px);
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #0f1624 0%, #121b2a 100%);
      box-shadow: 0 28px 90px rgba(0,0,0,0.42);
    }

    .media-add-card {
      width: min(760px, calc(100vw - 24px));
      overflow: hidden;
      padding: 18px;
    }

    .compact-head {
      margin-bottom: 14px;
    }

    .quick-media-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .quick-media-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #152236 0%, #121c2b 100%);
      color: var(--text);
      padding: 16px;
      text-align: left;
      cursor: pointer;
      min-height: 118px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    }

    .quick-media-card:hover {
      border-color: var(--accent);
      background: linear-gradient(180deg, #17304b 0%, #13263b 100%);
    }

    .quick-media-card strong {
      font-size: 14px;
    }

    .quick-media-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .global-media-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
    }

    .global-media-panel {
      width: min(1440px, 100%);
      height: min(920px, 100%);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #0d1522 0%, #101925 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 20px;
      overflow: hidden;
      box-shadow: 0 28px 90px rgba(0,0,0,0.42);
    }

    .global-media-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .global-media-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .global-media-layout {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
    }

    .global-media-sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
      padding-right: 4px;
    }

    .global-media-content {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(17, 26, 41, 0.82);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .global-media-content-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .global-media-library-grid {
      min-height: 0;
      flex: 1;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .global-media-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #152236 0%, #101a29 100%);
      color: var(--text);
      padding: 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 128px;
    }

    .global-media-card:hover {
      border-color: var(--accent);
      background: linear-gradient(180deg, #19314a 0%, #12273c 100%);
    }

    .global-media-card span,
    .global-media-card small {
      color: var(--muted);
      line-height: 1.45;
      word-break: break-word;
    }

    .bible-modal-card { padding: 18px; }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .modal-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: #182233;
      color: var(--text);
      width: 34px;
      height: 34px;
      border-radius: 10px;
      cursor: pointer;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 16px;
    }

    .modal-section {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(20, 31, 49, 0.84);
      padding: 14px;
    }

    .modal-section label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .modal-section input,
    .modal-section select {
      width: 100%;
      margin-bottom: 10px;
      background: #111a29;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .inline-grid.triple {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .inline-grid.double {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      max-height: 440px;
      overflow: auto;
    }

    .result-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #121d2d;
      color: var(--text);
      padding: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-card:hover {
      border-color: var(--accent);
      background: #13263b;
    }

    .result-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 980px) {
      .switcher-wrap { grid-template-columns: 1fr; }
      #golden-layout-toolbar { height: 64px; }
      #golden-layout-container { top: 64px; }
      .modal-grid { grid-template-columns: 1fr; }
      .inline-grid.triple { grid-template-columns: 1fr; }
      .inline-grid.double { grid-template-columns: 1fr; }
      .quick-media-grid { grid-template-columns: 1fr; }
      .global-media-layout { grid-template-columns: 1fr; }
      .clip-grid-head,
      .clip-layer-row { grid-template-columns: 120px repeat(4, minmax(140px, 1fr)); overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div id="golden-layout-toolbar"></div>
  <div id="golden-layout-container"></div>

  <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/dist/goldenlayout.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="plugins.js"></script>
  <script src="app-daw.js"></script>
</body>
</html>
