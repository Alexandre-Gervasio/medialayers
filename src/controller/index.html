<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; media-src 'self' blob: mediastream:; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>MediaLayers — Controle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════ -->
  <!--  TOPO: Logo + botões de ação global    -->
  <!-- ═══════════════════════════════════════ -->
  <header>
    <div class="header-left">
      <span class="logo">🎬 MediaLayers</span>
      <span class="version">v1.0</span>
    </div>
    <div class="header-right">
      <button id="btn-clear-all" class="btn btn-danger">⬛ Limpar Saída</button>
      <button id="btn-send-all"  class="btn btn-primary">▶ Enviar para Saída</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════ -->
  <!--  CORPO PRINCIPAL: 3 colunas           -->
  <!-- ═══════════════════════════════════════ -->
  <div class="workspace">

    <!-- ── Coluna 1: Painel de composições (Resolume-style) ── -->
    <section class="panel panel-columns">
      <div class="panel-header">
        <h2>Composições</h2>
        <div class="columns-toolbar">
          <button class="btn btn-sm" id="btn-add-column" title="Adicionar coluna">➕ Coluna</button>
        </div>
      </div>

      <!-- Carrossel horizontal de colunas -->
      <div id="columns-container" class="columns-container">
        <!-- Colunas populadas via JS -->
      </div>

      <!-- Toolbar de mídia (mostra quando coluna for selecionada) -->
      <div class="layer-add-buttons" id="layer-add-buttons" style="display: none;">
        <button class="btn btn-sm" id="btn-add-video"  title="Adicionar vídeo">🎥</button>
        <button class="btn btn-sm" id="btn-add-image"  title="Adicionar imagem">🖼</button>
        <button class="btn btn-sm" id="btn-add-audio"  title="Adicionar áudio">🔊</button>
        <button class="btn btn-sm" id="btn-add-text"   title="Adicionar texto">📝</button>
        <button class="btn btn-sm" id="btn-add-camera" title="Adicionar câmera/captura">📷</button>
      </div>
    </section>

    <!-- ── Coluna 2: Preview da saída ── -->
    <section class="panel panel-preview">
      <div class="panel-header">
        <h2>Preview da Saída</h2>
        <span class="preview-badge">AO VIVO</span>
      </div>
      <div class="preview-screen" id="preview-screen">
        <!-- Camadas de preview empilhadas -->
        <div class="preview-layer" id="preview-bg"></div>
        <div class="preview-layer" id="preview-media"></div>
        <div class="preview-layer" id="preview-text"></div>
        <div class="preview-placeholder">
          <span>👁 Preview aparece aqui</span>
        </div>
      </div>
    </section>

    <!-- ── Coluna 3: Propriedades da camada selecionada ── -->
    <section class="panel panel-properties">
      <div class="panel-header">
        <h2>Propriedades</h2>
      </div>
      <div id="properties-content" class="properties-empty">
        <span>Selecione uma camada para editar suas propriedades.</span>
      </div>
    </section>

  </div>

  <!-- ═══════════════════════════════════════ -->
  <!--  INPUTS DE ARQUIVO (ocultos)          -->
  <!-- ═══════════════════════════════════════ -->
  <input type="file" id="file-video"  accept="video/*"        style="display:none">
  <input type="file" id="file-image"  accept="image/*"        style="display:none">
  <input type="file" id="file-audio"  accept="audio/*"        style="display:none">

  <script src="app-resolume.js"></script>
  <script src="ndi-controller.js"></script>
  <script src="../stream/stream-controller.js"></script>
  <script src="../extensions/letras/letras-extension.js"></script>
  <script src="../extensions/biblia/biblia-extension.js"></script>
</body>
</html>
